<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3 demo (4B + 30B-MoE)</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f242e; --border:#2a313d;
    --text:#e6e8eb; --muted:#8b94a3; --accent:#5b9cff; --accent2:#7ee787;
    --think:#f0b429; --danger:#ff6b6b; --warn:#f0883e;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:14px;line-height:1.5}
  .layout{display:grid;grid-template-columns:230px 1fr;grid-template-rows:auto 1fr;height:100vh}
  header{grid-column:1/3;display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap}
  header h1{font-size:14px;margin:0;font-weight:600;white-space:nowrap}
  header select,header button{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:12px;font-family:inherit}
  header select:focus{outline:none;border-color:var(--accent)}
  header button{cursor:pointer}
  header button:hover{filter:brightness(1.12)}
  header button.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  header button.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
  header button.warn{background:var(--warn);color:#fff;border-color:var(--warn)}
  button.stop{background:var(--danger);color:#fff;border:0;border-radius:6px;padding:0 12px;font-weight:600;cursor:pointer;font-size:12px}
  button.stop:hover{filter:brightness(1.12)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .badge{background:var(--panel2);border:1px solid var(--border);padding:3px 8px;border-radius:6px;font-size:11px;color:var(--muted)}
  .badge b{color:var(--accent2);font-weight:600}
  .spacer{flex:1}
  #status-text{font-size:11px;color:var(--muted);min-width:80px}
  /* Sidebar */
  aside{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  aside .new-chat{margin:8px}
  aside ul{list-style:none;margin:0;padding:0;overflow-y:auto;flex:1}
  aside li{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  aside li:hover{background:var(--panel2)}
  aside li.active{background:var(--panel2);color:var(--text);border-left:3px solid var(--accent)}
  aside li .del{color:var(--danger);opacity:0;font-size:14px;padding:0 4px}
  aside li:hover .del{opacity:.7}
  /* Main */
  main{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);overflow:hidden}
  .col{background:var(--bg);display:flex;flex-direction:column;min-width:0}
  .col-head{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;background:var(--panel);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
  .col-head .title{font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.04em}
  .stats{display:flex;gap:10px;align-items:center}
  .stats span b{color:var(--accent2)}
  .stats .tps{color:var(--accent);font-variant-numeric:tabular-nums}
  .msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .msg .role{font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase}
  .msg.user .bubble{background:var(--panel2);border:1px solid var(--border);padding:8px 12px;border-radius:10px;display:inline-block;white-space:pre-wrap;word-break:break-word}
  .msg.assistant .bubble{white-space:pre-wrap;word-break:break-word}
  .cursor{display:inline-block;width:7px;height:14px;background:var(--accent);vertical-align:text-bottom;animation:blink 1s steps(2) infinite;margin-left:1px}
  @keyframes blink{50%{opacity:0}}
  .thinking-box{flex:1;overflow-y:auto;padding:14px;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;white-space:pre-wrap;word-break:break-word;color:var(--think);line-height:1.55}
  .thinking-empty{color:var(--muted);font-style:italic;font-family:inherit}
  .ctx-panel,.vram-panel{padding:10px 14px;border-top:1px solid var(--border);background:var(--panel)}
  .ctx-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:3px}
  .ctx-row b{color:var(--text);font-variant-numeric:tabular-nums}
  .bar{height:7px;background:var(--panel2);border-radius:4px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px}
  .bar>div{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .2s}
  .bar.vram>div{background:linear-gradient(90deg,var(--accent),var(--warn),var(--danger))}
  .gpu-row{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:4px;font-variant-numeric:tabular-nums}
  .composer{display:flex;gap:8px;padding:10px 14px;background:var(--panel);border-top:1px solid var(--border);align-items:flex-end}
  textarea{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px;resize:none;min-height:42px;max-height:120px}
  textarea:focus{outline:none;border-color:var(--accent)}
  button.send{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:0 16px;font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap}
  button.send:hover{filter:brightness(1.08)}
  button.send:disabled{opacity:.5;cursor:not-allowed}
  .err{color:var(--danger);padding:8px 14px;font-size:12px;white-space:pre-wrap;max-height:80px;overflow:auto}
  .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,17,21,.92);z-index:50;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px}
  .overlay .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .lbl{font-size:11px;color:var(--muted);margin-right:5px}
  .opt{display:flex;align-items:center;gap:4px}
  .opt input[type=checkbox]{accent-color:var(--accent)}
</style>
</head>
<body>
<div class="layout">
<header>
  <h1>Qwen3 demo</h1>
  <span class="lbl">модель:</span>
  <select id="model-select"></select>
  <span class="lbl">device:</span>
  <select id="device-select">
    <option value="mp">mp (model-parallel)</option>
    <option value="cuda">cuda (1 GPU)</option>
    <option value="cpu">cpu</option>
  </select>
  <label class="opt"><input type="checkbox" id="expert-offload"> expert offload</label>
  <button id="btn-load" class="primary">Загрузить</button>
  <button id="btn-unload" class="warn">Выгрузить</button>
  <button id="btn-reset" class="danger">Сброс контекста</button>
  <span class="spacer"></span>
  <span class="badge" id="mode-badge">—</span>
  <span id="status-text">…</span>
</header>

<aside>
  <button class="new-chat primary" id="btn-new-chat" style="padding:8px">+ Новый чат</button>
  <ul id="session-list"></ul>
</aside>

<main>
  <section class="col">
    <div class="col-head">
      <span class="title">Chat</span>
      <span class="stats">
        <span class="tps" id="tps-live">0.0 tok/s</span>
        <span>gen: <b id="gen-n">0</b></span>
        <button class="stop" id="btn-stop" style="display:none">⏹ Стоп</button>
      </span>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <textarea id="input" placeholder="Спросите… (Enter — отправить, Shift+Enter — перенос)" rows="1"></textarea>
      <button class="send" id="send">Отправить</button>
    </div>
  </section>
  <section class="col">
    <div class="col-head">
      <span class="title">Thinking</span>
      <span class="stats">
        <span>final: <b id="tps-final">—</b></span>
        <span><b id="elapsed">—</b>s</span>
      </span>
    </div>
    <div class="thinking-box" id="thinking"><span class="thinking-empty">Здесь появится цепочка рассуждений модели…</span></div>
    <div class="ctx-panel">
      <div class="ctx-row"><span>Контекст (KV-кэш)</span><span><b id="ctx-used">0</b> / <span id="ctx-max">0</span> токенов</span></div>
      <div class="bar"><div id="ctx-bar" style="width:0%"></div></div>
      <div class="ctx-row"><span>prompt: <b id="ctx-prompt">0</b></span><span>осталось: <b id="ctx-left">0</b></span></div>
      <div class="ctx-row"><span>KV-память</span><span><b id="kv-used">0 B</b> / <span id="kv-max">0 B</span></span></div>
    </div>
    <div class="vram-panel">
      <div class="ctx-row">
        <span>Видеокарты (VRAM) + RAM процесса</span>
        <span><b id="mem-total">—</b> <button id="btn-mem-refresh" style="font-size:10px;padding:1px 6px;cursor:pointer;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:4px">↻</button></span>
      </div>
      <div class="ctx-row"><span>VRAM суммарно: <b id="mem-vram">—</b> · RSS: <b id="mem-rss">—</b></span><span id="mem-model">—</span></div>
      <div id="vram-gpus"></div>
    </div>
  </section>
</main>
</div>
<div class="err" id="err" style="display:none;position:fixed;bottom:0;left:0;right:0"></div>
<div class="overlay" id="overlay" style="display:none"><span class="spin"></span><span id="overlay-text">…</span></div>

<script>
const $=id=>document.getElementById(id);
let currentSession=null, kvBytesPerToken=0, activeReader=null, activeAbort=null;
const LS_KEY='qwen3_demo_session';
const fmtB=n=>{const u=['B','KiB','MiB','GiB','TiB','PiB'];let i=0;while(Math.abs(n)>=1024&&i<u.length-1){n/=1024;i++;}return n.toFixed(1)+' '+u[i];};
function showError(t){const e=$('err');e.textContent=t;e.style.display=t?'block':'none';}
function setOverlay(on,text){$('overlay').style.display=on?'flex':'none';if(text)$('overlay-text').textContent=text;}

async function boot(){
  try{
    const r=await fetch('/api/models');const d=await r.json();
    const sel=$('model-select');sel.innerHTML='';
    for(const m of d.models){
      const o=document.createElement('option');o.value=m.id;
      o.textContent=`${m.display_name}  (${m.size_gb} GB)`;o.dataset.moe=m.moe;
      sel.appendChild(o);
    }
    sel.dispatchEvent(new Event('change'));
  }catch(e){showError('models: '+e);}
  await refreshSessions();
  refreshStatus();
  refreshMemory();
  setInterval(refreshStatus,4000);
  setInterval(refreshMemory,5000);
  // Restore last session from localStorage.
  const last=localStorage.getItem(LS_KEY);
  if(last && currentSession===null){ openSession(last); }
  else { newChat(); }
}
$('model-select').addEventListener('change',e=>{
  const opt=e.target.selectedOptions[0];
  const moe=opt&&opt.dataset.moe==='true';
  $('expert-offload').disabled=!moe;
  if(!moe)$('expert-offload').checked=false;
});

async function refreshStatus(){
  try{
    const r=await fetch('/api/status');const s=await r.json();
    const b=$('mode-badge');b.className='badge '+(s.loaded?'':'unloaded');
    b.innerHTML=s.loaded?`<b>${s.display_name||s.model_id}</b> · ${s.device}`:'<b>не загружено</b>';
    $('status-text').textContent=s.loaded?`idle ${Math.round(s.last_used_ago_s||0)}s`:'';
    renderVram(s.vram||[]);
  }catch(e){}
}
function renderVram(gpus){
  const box=$('vram-gpus');box.innerHTML='';
  if(!gpus||!gpus.length){box.innerHTML='<div class="gpu-row">нет GPU</div>';return;}
  if(gpus[0].error){box.innerHTML=`<div class="gpu-row">${gpus[0].error}</div>`;return;}
  for(const g of gpus){
    const pct=g.total_mib?(g.used_mib/g.total_mib*100):0;
    const row=document.createElement('div');
    row.innerHTML=`<div class="gpu-row"><span>GPU${g.gpu} · ${g.name}</span><span><b>${g.used_mib.toFixed(0)}</b> / ${g.total_mib.toFixed(0)} MiB · free ${g.free_mib.toFixed(0)}</span></div>
      <div class="bar vram"><div style="width:${pct.toFixed(1)}%"></div></div>`;
    box.appendChild(row);
  }
}

const fmtMiB=m=>m>=1024?(m/1024).toFixed(2)+' GiB':m.toFixed(0)+' MiB';
async function refreshMemory(){
  try{
    const r=await fetch('/api/memory');const d=await r.json();
    renderVram(d.vram||[]);
    const ram=d.ram||{};
    $('mem-vram').textContent=fmtMiB(ram.vram_used_mib||0)+' / '+fmtMiB(ram.vram_total_mib||0);
    $('mem-rss').textContent=fmtMiB(ram.rss_mib||0);
    $('mem-total').textContent='VRAM '+(ram.vram_used_mib?fmtMiB(ram.vram_used_mib):'—')+' + RSS '+(ram.rss_mib?fmtMiB(ram.rss_mib):'—');
    $('mem-model').textContent=d.loaded?('модель: '+d.model_id):'модель не загружена';
    // Process breakdown: ours vs other (show in the gpu list footer).
    const ours=d.ours_vram_mib||0, other=d.other_vram_mib||0;
    let procsBox=$('mem-procs');
    if(!procsBox){
      procsBox=document.createElement('div');procsBox.id='mem-procs';
      $('vram-gpus').parentNode.insertBefore(procsBox,$('vram-gpus').nextSibling);
    }
    const rows=(d.processes||[]).slice().sort((a,b)=>b.used_mib-a.used_mib);
    let html=`<div class="ctx-row" style="margin-top:6px"><span style="color:var(--accent2)">▼ мы (демка): <b>${fmtMiB(ours)}</b></span><span style="color:var(--warn)">▼ другие: <b>${fmtMiB(other)}</b></span></div>`;
    for(const p of rows){
      const color=p.ours?'var(--accent2)':'var(--warn)';
      const tag=p.ours?'[наш]':'[чужой]';
      const cmd=p.cmd?p.cmd.slice(0,70):'';
      html+=`<div class="gpu-row" style="font-size:10px;color:${color}"><span>${tag} PID ${p.pid} · GPU${p.gpu}</span><span><b>${p.used_mib.toFixed(0)} MiB</b></span></div>`;
      if(cmd)html+=`<div class="gpu-row" style="font-size:9px;color:var(--muted);margin-top:-2px"><span colspan="2" style="word-break:break-all">${cmd}</span></div>`;
    }
    procsBox.innerHTML=html;
  }catch(e){}
}

async function refreshSessions(){
  try{
    const r=await fetch('/api/sessions');const d=await r.json();
    const ul=$('session-list');ul.innerHTML='';
    for(const s of d.sessions){
      const li=document.createElement('li');
      li.dataset.id=s.id;
      if(currentSession===s.id)li.className='active';
      li.innerHTML=`<span>${escapeHtml(s.title||s.id)}</span><span class="del" title="удалить">✕</span>`;
      li.onclick=e=>{if(e.target.classList.contains('del'))deleteSession(s.id);else openSession(s.id);};
      ul.appendChild(li);
    }
  }catch(e){}
}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function newChat(){
  const model_id=$('model-select').value;
  const r=await fetch('/api/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model_id})});
  const s=await r.json();
  currentSession=s.id;localStorage.setItem(LS_KEY,s.id);
  renderSession(s);await refreshSessions();
}
async function openSession(id){
  const r=await fetch('/api/sessions/'+id);
  if(!r.ok){newChat();return;}
  const s=await r.json();
  currentSession=id;localStorage.setItem(LS_KEY,id);
  renderSession(s);
  // If there's an in-flight generation, re-attach.
  if(s.generation && !s.generation.done){ attachStream(id); }
  await refreshSessions();
}
async function deleteSession(id){
  await fetch('/api/sessions/'+id,{method:'DELETE'});
  if(currentSession===id){await newChat();}
  else await refreshSessions();
}
function renderSession(s){
  $('msgs').innerHTML='';
  $('thinking').innerHTML='<span class="thinking-empty">…</span>';
  if(s.messages){
    for(const m of s.messages){
      const w=addMsg(m.role,m.content);
      if(m.role==='assistant')w.querySelector('.bubble').textContent=m.content;
    }
  }
}
function addMsg(role,text){
  const wrap=document.createElement('div');wrap.className='msg '+role;
  wrap.innerHTML='<div class="role">'+role+'</div><div class="bubble"></div>';
  wrap.querySelector('.bubble').textContent=text;
  $('msgs').appendChild(wrap);$('msgs').scrollTop=$('msgs').scrollHeight;
  return wrap;
}
function setCtx(used,max,kvUsed,kvMax){
  $('ctx-used').textContent=used.toLocaleString('ru');
  $('ctx-max').textContent=max.toLocaleString('ru');
  $('ctx-bar').style.width=Math.min(100,used/max*100).toFixed(2)+'%';
  $('kv-used').textContent=fmtB(kvUsed);$('kv-max').textContent=fmtB(kvMax);
  $('ctx-left').textContent=Math.max(0,max-used).toLocaleString('ru');
}

async function doLoad(){
  const model_id=$('model-select').value;const device=$('device-select').value;const expert_offload=$('expert-offload').checked;
  setOverlay(true,`загрузка ${model_id} (${device})…`);
  showError('');
  try{
    const r=await fetch('/api/load',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model_id,device,expert_offload})});
    const d=await r.json();if(!r.ok)throw new Error(d.detail||'load failed');
    refreshStatus();
  }catch(e){showError('load: '+e.message);}
  finally{setOverlay(false);}
}
async function doUnload(){
  setOverlay(true,'освобождение CPU+GPU памяти…');
  try{
    const before=await fetch('/api/memory').then(r=>r.json());
    await fetch('/api/unload',{method:'POST'});
    // Give the manager a moment to actually free + empty_cache.
    await new Promise(r=>setTimeout(r,1500));
    const after=await fetch('/api/memory').then(r=>r.json());
    const fb=before.ram||{}, fa=after.ram||{};
    const freedVram=((fb.vram_used_mib||0)-(fa.vram_used_mib||0));
    const freedRss=((fb.rss_mib||0)-(fa.rss_mib||0));
    const msg=`Освобождено: VRAM ${fmtMiB(Math.max(0,freedVram))}, RAM ${fmtMiB(Math.max(0,freedRss))}. Модель выгружена, сессии сохранены.`;
    $('msgs').innerHTML='';$('thinking').innerHTML='<span class="thinking-empty">модель выгружена (контекст сброшен, сессии в SQLite сохранены)</span>';
    setOverlay(false);showError(msg);
  }catch(e){setOverlay(false);showError(e);}
  refreshStatus();refreshMemory();
}
async function doReset(){
  try{await fetch('/api/reset',{method:'POST'});$('msgs').innerHTML='';$('thinking').innerHTML='<span class="thinking-empty">контекст сброшен</span>';}catch(e){showError(e);}
  refreshStatus();
}
async function doStop(){
  if(!currentSession)return;
  try{await fetch('/api/stop/'+currentSession,{method:'POST'});}catch(e){showError(e);}
}

function handleFrame(line,state){
  const obj=JSON.parse(line.slice(5).trim());
  if(obj.type==='prompt'){$('ctx-prompt').textContent=obj.tokens.toLocaleString('ru');}
  else if(obj.type==='ctx')setCtx(obj.used,obj.max,obj.kv_bytes,obj.kv_bytes_per_token*obj.max);
  else if(obj.type==='vram')renderVram(obj.gpus||[]);
  else if(obj.type==='token'){
    if(obj.phase==='thinking'){state.thinking+=obj.text;const b=$('thinking');b.textContent=state.thinking;b.scrollTop=b.scrollHeight;}
    else{state.answer+=obj.text;state.bubble.textContent=state.answer;state.bubble.appendChild(state.cursor);$('msgs').scrollTop=$('msgs').scrollHeight;}
  }
  else if(obj.type==='stats_live'){$('tps-live').textContent=obj.tps.toFixed(2)+' tok/s';$('gen-n').textContent=obj.n;}
  else if(obj.type==='stats'){$('tps-final').textContent=obj.tps.toFixed(2);$('elapsed').textContent=obj.elapsed;}
  else if(obj.type==='error')showError(obj.message);
}

async function attachStream(sessionId){
  // Re-attach to in-flight generation.
  const aWrap=addMsg('assistant','');const bubble=aWrap.querySelector('.bubble');
  const cursor=document.createElement('span');cursor.className='cursor';bubble.appendChild(cursor);
  const state={thinking:'',answer:'',bubble,cursor};
  $('btn-stop').style.display='';
  try{
    const resp=await fetch('/api/stream/'+sessionId);
    const reader=resp.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const frames=buf.split('\n\n');buf=frames.pop();
      for(const f of frames){const line=f.trim();if(line.startsWith('data:'))handleFrame(line,state);}
    }
  }catch(e){}
  finally{$('btn-stop').style.display='none';if(cursor.parentNode)cursor.remove();}
}

async function send(){
  const text=$('input').value.trim();if(!text)return;
  const model_id=$('model-select').value;const device=$('device-select').value;const expert_offload=$('expert-offload').checked;
  $('input').value='';$('input').style.height='auto';
  addMsg('user',text);
  const aWrap=addMsg('assistant','');const bubble=aWrap.querySelector('.bubble');
  const cursor=document.createElement('span');cursor.className='cursor';bubble.appendChild(cursor);
  const state={thinking:'',answer:'',bubble,cursor};
  $('thinking').innerHTML='<span class="thinking-empty">…</span>';
  $('btn-stop').style.display='';$('send').disabled=true;
  try{
    const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text,session_id:currentSession,model_id,device,expert_offload,max_new_tokens:8192})});
    if(!resp.ok){const e=await resp.json();throw new Error(e.detail||'chat failed');}
    if(resp.headers.get('X-Session-Id')){currentSession=resp.headers.get('X-Session-Id');localStorage.setItem(LS_KEY,currentSession);}
    const reader=resp.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const frames=buf.split('\n\n');buf=frames.pop();
      for(const f of frames){const line=f.trim();if(line.startsWith('data:'))handleFrame(line,state);}
    }
    if(!state.answer)bubble.textContent='(пустой ответ)';else if(cursor.parentNode)cursor.remove();
  }catch(e){showError(e.message);}
  finally{$('btn-stop').style.display='none';$('send').disabled=false;refreshSessions();}
}

$('btn-load').onclick=doLoad;$('btn-unload').onclick=doUnload;$('btn-reset').onclick=doReset;
$('btn-stop').onclick=doStop;$('btn-new-chat').onclick=newChat;
$('btn-mem-refresh').onclick=refreshMemory;
$('send').onclick=send;
$('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
$('input').addEventListener('input',e=>{e.target.style.height='auto';e.target.style.height=Math.min(120,e.target.scrollHeight)+'px';});
boot();
</script>
