<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3-4B-Thinking-2507-FP8 demo</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f242e; --border:#2a313d;
    --text:#e6e8eb; --muted:#8b94a3; --accent:#5b9cff; --accent2:#7ee787;
    --think:#f0b429; --danger:#ff6b6b;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:14px;line-height:1.5;
  }
  header{
    display:flex;align-items:center;gap:14px;padding:10px 16px;
    background:var(--panel);border-bottom:1px solid var(--border);
  }
  header h1{font-size:15px;margin:0;font-weight:600}
  header .badge{
    background:var(--panel2);border:1px solid var(--border);
    padding:3px 8px;border-radius:6px;font-size:11px;color:var(--muted);
  }
  header .badge b{color:var(--accent2);font-weight:600}
  main{
    display:grid;grid-template-columns:1fr 1fr;gap:1px;
    height:calc(100vh - 53px);background:var(--border);
  }
  .col{background:var(--bg);display:flex;flex-direction:column;min-width:0}
  .col-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);
    font-size:12px;color:var(--muted);
  }
  .col-head .title{font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.04em}
  .stats{display:flex;gap:14px;align-items:center}
  .stats span b{color:var(--accent2)}
  .stats .tps{color:var(--accent);font-variant-numeric:tabular-nums}
  .msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:100%}
  .msg .role{font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .msg.user .bubble{
    background:var(--panel2);border:1px solid var(--border);
    padding:8px 12px;border-radius:10px;display:inline-block;white-space:pre-wrap;word-break:break-word;
  }
  .msg.assistant .bubble{white-space:pre-wrap;word-break:break-word}
  .cursor{display:inline-block;width:7px;height:14px;background:var(--accent);
    vertical-align:text-bottom;animation:blink 1s steps(2) infinite;margin-left:1px}
  @keyframes blink{50%{opacity:0}}
  .thinking-box{
    flex:1;overflow-y:auto;padding:14px;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;
    white-space:pre-wrap;word-break:break-word;color:var(--think);line-height:1.55;
  }
  .thinking-empty{color:var(--muted);font-style:italic;font-family:inherit}
  .ctx-panel{
    background:var(--panel);border-top:1px solid var(--border);padding:10px 14px;
    display:flex;flex-direction:column;gap:6px;
  }
  .ctx-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
  .ctx-row b{color:var(--text);font-variant-numeric:tabular-nums}
  .bar{height:8px;background:var(--panel2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
  .bar > div{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .2s}
  .composer{
    display:flex;gap:8px;padding:10px 14px;
    background:var(--panel);border-top:1px solid var(--border);
  }
  textarea{
    flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px;resize:none;
    min-height:42px;max-height:120px;
  }
  textarea:focus{outline:none;border-color:var(--accent)}
  button{
    background:var(--accent);color:#fff;border:0;border-radius:8px;padding:0 16px;
    font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap;
  }
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.5;cursor:not-allowed}
  button.stop{background:var(--danger)}
  .err{color:var(--danger);padding:10px 14px;font-size:12px;white-space:pre-wrap}
  .scroll-hint{opacity:.6;font-size:11px}
</style>
</head>
<body>
<header>
  <h1>Qwen3-4B-Thinking-2507-FP8</h1>
  <span class="badge" id="mode">mode: …</span>
  <span class="badge" id="placement">placement: …</span>
  <span class="badge" id="kv-rate">… bytes/tok</span>
</header>
<main>
  <!-- LEFT: chat -->
  <section class="col">
    <div class="col-head">
      <span class="title">Chat</span>
      <span class="stats">
        <span class="tps" id="tps-live">0.0 tok/s</span>
        <span>gen: <b id="gen-n">0</b></span>
      </span>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <textarea id="input" placeholder="Спросите что-нибудь…  (Enter — отправить, Shift+Enter — перенос строки)" rows="1"></textarea>
      <button id="send">Отправить</button>
    </div>
  </section>

  <!-- RIGHT: thinking + context -->
  <section class="col">
    <div class="col-head">
      <span class="title">Thinking</span>
      <span class="stats">
        <span>final: <b id="tps-final">—</b></span>
        <span><b id="elapsed">—</b>s</span>
      </span>
    </div>
    <div class="thinking-box" id="thinking"><span class="thinking-empty">Здесь появится цепочка рассуждений модели…</span></div>
    <div class="ctx-panel">
      <div class="ctx-row">
        <span>Контекст (KV-кэш)</span>
        <span><b id="ctx-used">0</b> / <span id="ctx-max">0</span> токенов</span>
      </div>
      <div class="bar"><div id="ctx-bar" style="width:0%"></div></div>
      <div class="ctx-row">
        <span>Память KV-кэша</span>
        <span><b id="kv-used">0 B</b> / <span id="kv-max">0 B</span></span>
      </div>
      <div class="ctx-row">
        <span class="scroll-hint">prompt: <b id="ctx-prompt">0</b> · осталось: <b id="ctx-left">0</b></span>
        <span><b id="kv-rate2">—</b>/токен</span>
      </div>
    </div>
  </section>
</main>
<div class="err" id="err" style="display:none"></div>

<script>
const $ = id => document.getElementById(id);
let history = [];
let generating = false;
let abortCtrl = null;
let kvBytesPerToken = 0;

async function boot(){
  try{
    const r = await fetch('/api/info');
    const d = await r.json();
    $('mode').innerHTML = 'mode: <b>' + d.mode + '</b>';
    $('placement').innerHTML = 'placement: <b>' + d.placement + '</b>';
    kvBytesPerToken = d.kv_bytes_per_token;
    $('kv-rate').textContent = fmtB(d.kv_bytes_per_token) + '/tok';
    $('kv-rate2').textContent = fmtB(d.kv_bytes_per_token);
    $('ctx-max').textContent = d.max_position_embeddings.toLocaleString('ru');
    $('kv-max').textContent = fmtB(d.kv_bytes_per_token * d.max_position_embeddings);
  }catch(e){ showError('info: ' + e); }
}

function fmtB(n){
  const u=['B','KiB','MiB','GiB','TiB','PiB'];
  let i=0; while(Math.abs(n)>=1024 && i<u.length-1){n/=1024;i++;} return n.toFixed(1)+' '+u[i];
}

function addMsg(role, text){
  const wrap=document.createElement('div');
  wrap.className='msg '+role;
  wrap.innerHTML='<div class="role">'+role+'</div><div class="bubble"></div>';
  wrap.querySelector('.bubble').textContent=text;
  $('msgs').appendChild(wrap);
  $('msgs').scrollTop=$('msgs').scrollHeight;
  return wrap;
}

function showError(t){ const e=$('err'); e.textContent=t; e.style.display=t?'block':'none'; }

function setCtx(used, max, kvBytesUsed, kvBytesMax){
  $('ctx-used').textContent=used.toLocaleString('ru');
  $('ctx-max').textContent=max.toLocaleString('ru');
  const pct=Math.min(100,(used/max)*100);
  $('ctx-bar').style.width=pct.toFixed(2)+'%';
  $('kv-used').textContent=fmtB(kvBytesUsed);
  $('kv-max').textContent=fmtB(kvBytesMax);
  $('ctx-left').textContent=Math.max(0,max-used).toLocaleString('ru');
}

async function send(){
  const text=$('input').value.trim();
  if(!text || generating) return;
  generating=true; $('send').disabled=true; $('send').textContent='…';
  showError('');
  addMsg('user', text);
  const aWrap=addMsg('assistant','');
  const bubble=aWrap.querySelector('.bubble');
  const cursor=document.createElement('span'); cursor.className='cursor'; bubble.appendChild(cursor);
  $('thinking').innerHTML='<span class="thinking-empty">…</span>';
  let thinkingText=''; let answerText='';

  try{
    const resp=await fetch('/api/chat',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text, history:history, max_new_tokens:8192}),
    });
    const reader=resp.body.getReader();
    const dec=new TextDecoder();
    let buf='';
    let promptTokens=0, ctxMax=0;
    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const frames=buf.split('\n\n'); buf=frames.pop();
      for(const f of frames){
        const line=f.trim();
        if(!line.startsWith('data:')) continue;
        const obj=JSON.parse(line.slice(5).trim());
        if(obj.type==='prompt'){ promptTokens=obj.tokens; $('ctx-prompt').textContent=promptTokens.toLocaleString('ru'); }
        else if(obj.type==='ctx'){
          setCtx(obj.used, obj.max, obj.kv_bytes, kvBytesPerToken*obj.max);
          ctxMax=obj.max;
        }
        else if(obj.type==='token'){
          if(obj.phase==='thinking'){
            thinkingText+=obj.text;
            const box=$('thinking'); box.textContent=thinkingText; box.scrollTop=box.scrollHeight;
          }else{
            answerText+=obj.text;
            bubble.textContent=answerText; bubble.appendChild(cursor);
            $('msgs').scrollTop=$('msgs').scrollHeight;
          }
        }
        else if(obj.type==='stats_live'){
          $('tps-live').textContent=obj.tps.toFixed(2)+' tok/s';
          $('gen-n').textContent=obj.n;
        }
        else if(obj.type==='stats'){
          $('tps-final').textContent=obj.tps.toFixed(2);
          $('elapsed').textContent=obj.elapsed;
        }
        else if(obj.type==='done'){
          history.push({role:'user',content:text});
          history.push({role:'assistant',content:answerText});
        }
        else if(obj.type==='error'){ showError(obj.message); }
      }
    }
    if(!answerText) bubble.textContent='(пустой ответ)';
    else if(cursor.parentNode) cursor.remove();
  }catch(e){ showError(e); }
  finally{
    generating=false; $('send').disabled=false; $('send').textContent='Отправить';
  }
}

$('send').addEventListener('click', send);
$('input').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
$('input').addEventListener('input', e=>{
  e.target.style.height='auto'; e.target.style.height=Math.min(120,e.target.scrollHeight)+'px';
});
boot();
</script>
</body>
</html>
